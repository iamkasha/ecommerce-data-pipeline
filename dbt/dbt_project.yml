name: 'ecommerce_pipeline'
version: '1.0.0'
config-version: 2

profile: 'ecommerce_pipeline'

model-paths:    ["models"]
test-paths:     ["tests"]
macro-paths:    ["macros"]
target-path:    "target"
clean-targets:  ["target", "dbt_packages"]

models:
  ecommerce_pipeline:
    staging:
      +schema:       staging
      +materialized: view
    intermediate:
      +schema:       intermediate
      +materialized: ephemeral
    marts:
      +schema:       analytics
      finance:
        +materialized: table
      marketing:
        +materialized: table
      product:
        +materialized: table
