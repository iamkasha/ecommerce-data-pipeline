name: CI — Data Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       ecommerce
          POSTGRES_USER:     pipeline
          POSTGRES_PASSWORD: pipeline123
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5

      warehouse:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       warehouse
          POSTGRES_USER:     warehouse
          POSTGRES_PASSWORD: warehouse123
        ports: ["5439:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-ci.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run unit tests
        env:
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     5432
          POSTGRES_DB:       ecommerce
          POSTGRES_USER:     pipeline
          POSTGRES_PASSWORD: pipeline123
          REDSHIFT_HOST:     localhost
          REDSHIFT_PORT:     5439
          REDSHIFT_DB:       warehouse
          REDSHIFT_USER:     warehouse
          REDSHIFT_PASSWORD: warehouse123
          ENVIRONMENT:       local
        run: pytest tests/unit/ -v --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  dbt-compile:
    name: dbt Compile Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       warehouse
          POSTGRES_USER:     warehouse
          POSTGRES_PASSWORD: warehouse123
        ports: ["5439:5432"]
        options: --health-cmd pg_isready --health-interval 10s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dbt
        run: pip install dbt-postgres==1.7.4

      - name: Set up dbt profile
        run: |
          cp dbt/profiles.yml.example dbt/profiles.yml
        env:
          REDSHIFT_HOST:     localhost
          REDSHIFT_PORT:     5439
          REDSHIFT_DB:       warehouse
          REDSHIFT_USER:     warehouse
          REDSHIFT_PASSWORD: warehouse123

      - name: dbt compile (syntax check)
        working-directory: dbt
        run: dbt compile --profiles-dir .

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend=false -upgrade

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate
        env:
          AWS_DEFAULT_REGION: us-east-1
